<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie - Online Food Ordering</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Foodie</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="foods.html">Menu</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li id="orders-link" style="display:none;"><a href="orders.html">My Orders</a></li>
            <li id="login-link"><a href="login.html">Login</a></li>
            <li id="register-link"><a href="register.html">Register</a></li>
            <li id="logout-link" style="display:none;"><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <header>
        <h1>Welcome to Foodie</h1>
        <p>Delicious food delivered to your doorstep.</p>
        <a href="foods.html" class="btn">Order Now</a>
    </header>

    <section id="contact">
        <h2>Contact Us</h2>
        <form id="contact-form">
            <input type="text" id="contact-name" placeholder="Your Name" required>
            <input type="email" id="contact-email" placeholder="Your Email" required>
            <textarea id="contact-message" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Foodie App. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
