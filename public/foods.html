<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Foodie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Foodie</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="foods.html">Menu</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li id="orders-link" style="display:none;"><a href="orders.html">My Orders</a></li>
            <li id="login-link"><a href="login.html">Login</a></li>
            <li id="logout-link" style="display:none;"><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>Our Menu</h2>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search for food...">
            <button onclick="searchFood()">Search</button>
        </div>

        <div id="admin-controls" style="display:none; margin-bottom: 20px;">
            <button onclick="showAddFoodForm()">Add New Food</button>
        </div>

        <div id="food-list" class="food-grid">
            <!-- Food items will be loaded here -->
        </div>
    </div>

    <!-- Modal for Add/Edit Food -->
    <div id="food-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modal-title">Add Food</h3>
            <form id="food-form">
                <input type="hidden" id="food-id">
                <input type="text" id="food-name" placeholder="Food Name" required>
                <input type="text" id="food-description" placeholder="Description" required>
                <input type="number" id="food-price" placeholder="Price" required>
                <input type="text" id="food-image" placeholder="Image URL" required>
                <input type="text" id="food-category" placeholder="Category" required>
                <button type="submit">Save</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
